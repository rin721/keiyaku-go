name: 工程治理

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  governance:
    name: 治理检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 运行治理检查
        shell: pwsh
        run: ./scripts/check-governance.ps1

  go:
    name: Go Lint 与测试
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 检测 Go Module
        id: go-module
        shell: bash
        run: |
          if [ -f go.mod ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "未发现 go.mod；当前为治理基线阶段，跳过 Go lint 与测试。"
          fi

      - name: 安装 Go
        if: steps.go-module.outputs.present == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: 运行单元测试
        if: steps.go-module.outputs.present == 'true'
        run: go test ./...

      - name: 运行 golangci-lint
        if: steps.go-module.outputs.present == 'true'
        uses: golangci/golangci-lint-action@v6
        with:
          args: --config=.golangci.yml

  secrets:
    name: Secret 扫描
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 运行 gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
