name: 工程治理

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  governance:
    name: 治理检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 刷新治理索引
        shell: pwsh
        run: ./scripts/export-governance-map.ps1

      - name: 验证 governance-map 已提交
        shell: pwsh
        run: git diff --exit-code -- docs/governance/governance-map.json

      - name: 运行治理检查
        shell: pwsh
        run: ./scripts/check-governance.ps1

  go:
    name: Go Lint 与测试
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 检测可分析 Go Package
        id: go-packages
        shell: pwsh
        run: |
          ./scripts/check-go-package-state.ps1
          if ($LASTEXITCODE -eq 0) {
            "present=true" >> $env:GITHUB_OUTPUT
          } elseif ($LASTEXITCODE -eq 2 -or $LASTEXITCODE -eq 3) {
            "present=false" >> $env:GITHUB_OUTPUT
            exit 0
          } else {
            exit $LASTEXITCODE
          }

      - name: 安装 Go
        if: steps.go-packages.outputs.present == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: 运行单元测试
        if: steps.go-packages.outputs.present == 'true'
        run: go test ./...

      - name: 运行 golangci-lint
        if: steps.go-packages.outputs.present == 'true'
        uses: golangci/golangci-lint-action@v6
        with:
          args: --config=.golangci.yml

  secrets:
    name: Secret 扫描
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 运行 gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
