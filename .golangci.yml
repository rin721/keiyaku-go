run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - gosec
    - gocritic
    - wrapcheck
    - depguard

linters-settings:
  depguard:
    rules:
      pkg-must-not-import-internal:
        files:
          - "pkg/**/*.go"
        deny:
          - pkg: "github.com/rin721/keiyaku-go/internal"
            desc: "pkg 是业务无关共享库，不得 import internal 业务代码"
          - pkg: "internal"
            desc: "pkg 是业务无关共享库，不得 import internal 业务代码"
      lower-layers-must-not-import-transport:
        files:
          - "internal/domain/**/*.go"
          - "internal/repository/**/*.go"
          - "internal/infrastructure/**/*.go"
        deny:
          - pkg: "github.com/rin721/keiyaku-go/internal/api"
            desc: "domain/repository/infrastructure 不得依赖传输层 DTO"
          - pkg: "github.com/rin721/keiyaku-go/internal/handler"
            desc: "domain/repository/infrastructure 不得依赖传输层 DTO"
          - pkg: "internal/api"
            desc: "domain/repository/infrastructure 不得依赖传输层 DTO"
          - pkg: "internal/handler"
            desc: "domain/repository/infrastructure 不得依赖传输层 DTO"
  gosec:
    excludes:
      - G104
  wrapcheck:
    ignoreSigs:
      - .Errorf(
      - errors.New(
      - errors.Join(

issues:
  exclude-use-default: false
