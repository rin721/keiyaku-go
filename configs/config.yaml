app:
  name: keiyaku-go
  env: local

server:
  addr: ":8080"
  read_timeout: 5s
  write_timeout: 10s
  shutdown_timeout: 10s

log:
  level: info
  format: json
  output_dir: logs
  max_size_mb: 100
  max_backups: 7
  max_age_days: 30
  compress: true

mysql:
  dsn: "keiyaku:123456@tcp(38.14.250.76:3306)/keiyaku?charset=utf8mb4&parseTime=True&loc=UTC"
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime: 1h
  conn_max_idle_time: 30m
  slow_threshold: 200ms

redis:
  addr: "38.14.250.76:6379"
  username: ""
  password: "redis_858b27"
  db: 0
  dial_timeout: 3s
  read_timeout: 1s
  write_timeout: 1s

jwt:
  secret: "change-me-with-env-KEIYAKU_JWT_SECRET-32-bytes-min"
  issuer: keiyaku-go
  access_token_ttl: 15m
  refresh_token_ttl: 168h

iam:
  addr: ":8081"
  base_url: "http://127.0.0.1:8081"
  service_token: ""
  timeout: 3s

snowflake:
  node: 1

security:
  bcrypt_cost: 12
  rate_limit:
    requests_per_second: 100
    burst: 200
  circuit_breaker:
    failure_threshold: 5
    open_timeout: 5s

i18n:
  default: en-US
  supported:
    - en-US
    - zh-CN
  files:
    en-US: i18n/en-US.yaml
    zh-CN: i18n/zh-CN.yaml

rbac:
  model_path: rbac/model.conf
  policy_path: rbac/policy.csv

plugins:
  enabled: true
  public_prefix: "/api/v1/extensions"
  heartbeat_ttl: 30s
  request_timeout: 5s
  max_registration_body_bytes: 1048576
  max_gateway_body_bytes: 10485760
  max_route_timeout: 5s
  health_check_interval: 15s
  health_check_timeout: 2s
  unhealthy_threshold: 3
  route_cache_ttl: 5s
  maintenance_interval: 1m
  audit_retention_days: 30
  max_audit_query_limit: 200
  allow_public_routes: false
  trusted_plugins:
    blog:
      registration_secret: "change-me-blog-registration-secret-32b"
      gateway_secret: "change-me-blog-gateway-secret-32bytes"
      allowed_hosts: []
      allowed_cidrs:
        - "127.0.0.1/32"
      allowed_gateway_prefixes:
        - "/api/v1/extensions/blog"
      allowed_auth_policies:
        - "inherit"
        - "authenticated"
        - "rbac"
        - "admin"
      allowed_methods:
        - "GET"
        - "POST"
        - "PUT"
        - "PATCH"
        - "DELETE"
      allow_loopback: true
      allow_insecure_http: true
